services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cat-care-sqlserver
    environment:
      SA_PASSWORD: "Password123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' || /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1'",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  sqlserverdata:
